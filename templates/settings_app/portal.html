{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="forms-container" style="padding: 10px 24px 40px 24px;">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(0, 255, 150, 0.15); padding-bottom: 12px;">
        <i class="bi bi-cloud-check" style="color: #00ff66; font-size: 24px;"></i>
        <h2 style="color: #00ff66; margin: 0; font-size: 20px; font-weight: 600;">Entegratör & Portal Ayarları</h2>
    </div>

    <div class="card" style="background: rgba(15, 31, 23, 0.5); border: 1px solid rgba(0, 255, 150, 0.2); border-radius: 6px; padding: 20px; max-width: 500px;">
        <form style="display: flex; flex-direction: column; gap: 16px;">
            <div>
                <label style="display: block; color: #1a202c; font-size: 13px; margin-bottom: 6px; font-weight: 600;">E-Fatura Entegratör Seçimi</label>
                <select class="search-input" style="width: 100%; height: 32px; box-sizing: border-box; padding: 0 5px;">
                    <option>Zenithar Entegrasyon Altyapısı</option>
                    <option>GİB Portal (Manuel)</option>
                </select>
            </div>
            <div>
                <label style="display: block; color: #1a202c; font-size: 13px; margin-bottom: 6px; font-weight: 600;">API / Kullanıcı Adı</label>
                <input type="text" class="search-input" style="width: 100%; box-sizing: border-box;" value="zenithar_api_user">
            </div>
            <div>
                <label style="display: block; color: #1a202c; font-size: 13px; margin-bottom: 6px; font-weight: 600;">API Bağlantı Şifresi</label>
                <input type="password" class="search-input" style="width: 100%; box-sizing: border-box;" value="********">
            </div>
            <div>
                <button type="button" class="dark-btn" style="background: #002208; border: 1px solid #004411; color: #00ff66; padding: 8px 16px; cursor: pointer;">Bağlantıyı Test Et & Kaydet</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
