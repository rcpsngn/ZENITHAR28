{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="forms-container" style="padding: 10px 24px 40px 24px;">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(0, 255, 150, 0.15); padding-bottom: 12px;">
        <i class="bi bi-cpu" style="color: #00ff66; font-size: 24px;"></i>
        <h2 style="color: #00ff66; margin: 0; font-size: 20px; font-weight: 600;">Sistem Genel Parametreleri</h2>
    </div>

    <div class="card" style="background: rgba(15, 31, 23, 0.5); border: 1px solid rgba(0, 255, 150, 0.2); border-radius: 6px; padding: 20px; max-width: 500px;">
        <form style="display: flex; flex-direction: column; gap: 16px;">
            <div>
                <label style="display: block; color: #1a202c; font-size: 13px; margin-bottom: 6px; font-weight: 600;">Varsayılan Sistem Dili</label>
                <select class="search-input" style="width: 100%; height: 32px; box-sizing: border-box; padding: 0 5px;">
                    <option>Türkçe (TR)</option>
                    <option>English (EN)</option>
                </select>
            </div>
            <div style="border-top: 1px solid #002206; padding-top: 12px;">
                <label style="display: block; color: #1a202c; font-size: 13px; margin-bottom: 6px; font-weight: 600;">Veritabanı Bakım ve Güvenlik</label>
                <button type="button" class="dark-btn" style="background: #004411; border: 1px solid #00ff66; color: #00ff66; width: 100%; padding: 8px 0; font-weight: bold; cursor: pointer;">
                    <i class="bi bi-download"></i> SQL Veritabanı Yedeği İndir (.sqlite3)
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
