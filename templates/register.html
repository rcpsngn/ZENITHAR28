{% load static %}
<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENITHAR Kayıt</title>

<link rel="stylesheet" href="{% static 'css/pages/login.css' %}">

</head>

<body>

<canvas id="matrix"></canvas>

<div class="login-container">

<h2>ZENITHAR Kayıt Ol</h2>

<form method="POST">

{% csrf_token %}

<input
type="text"
name="username"
placeholder="Kullanıcı Adı"
required
>

<input
type="email"
name="email"
placeholder="Email"
required
>

<input
type="password"
name="password"
placeholder="Şifre"
required
>

<button type="submit">
Kayıt Ol
</button>

</form>

<div class="links">

<a href="{% url 'login' %}">Giriş Yap</a>

<a href="{% url 'password_reset' %}">Şifremi Unuttum</a>

</div>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</div>

<script src="{% static 'js/auth/matrix.js' %}"></script>

</body>
</html>
