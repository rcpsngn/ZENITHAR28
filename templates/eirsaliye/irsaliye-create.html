{% extends "base.html" %}
{% block content %}

<div class="card">

<h2>E-İrsaliye Oluştur</h2>

<form method="POST">
{% csrf_token %}

<label>İrsaliye No</label>
<input type="text" name="irsaliye_no">

<label>Müşteri</label>
<input type="text" name="customer_name">

<label>Vergi No</label>
<input type="text" name="customer_tax_id">

<label>Tarih</label>
<input type="date" name="issue_date">

<label>Tutar</label>
<input type="number" name="amount">

<label>KDV</label>
<input type="number" name="vat_amount">

<label>Toplam</label>
<input type="number" name="total_amount">

<label>Not</label>
<textarea name="notes"></textarea>

<button type="submit">Kaydet</button>

</form>

</div>

{% endblock %}
