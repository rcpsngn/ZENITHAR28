{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="forms-container" style="padding: 10px 24px 40px 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(0, 255, 150, 0.15); padding-bottom: 12px;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i class="bi bi-clock-history" style="color: #00ff66; font-size: 24px;"></i>
            <h2 style="color: #00ff66; margin: 0; font-size: 20px; font-weight: 600;">Personel Giriş - Çıkış Takip Sistemi</h2>
        </div>
    </div>

    <div class="card" style="background: rgba(15, 31, 23, 0.5); border: 1px solid rgba(0, 255, 150, 0.2); border-radius: 6px; padding: 20px; overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 2px solid #004411; color: #00ff66; font-size: 12px;">
                    <th style="padding: 10px;">Tarih</th>
                    <th style="padding: 10px;">Personel Ad Soyad</th>
                    <th style="padding: 10px; color: #00ff66;">Giriş Saati</th>
                    <th style="padding: 10px; color: #ff4444;">Çıkış Saati</th>
                    <th style="padding: 10px;">Çalışma Süresi</th>
                </tr>
            </thead>
            <tbody>
                <tr style="border-bottom: 1px solid #002206; font-size: 13px; color: #1a202c; font-weight: 500;">
                    <td style="padding: 12px 10px;">30.06.2026</td>
                    <td style="padding: 12px 10px;">Ahmet Yılmaz</td>
                    <td style="padding: 12px 10px; color: #004411; font-weight: bold;">08:30</td>
                    <td style="padding: 12px 10px; color: #660000; font-weight: bold;">18:00</td>
                    <td style="padding: 12px 10px;">09 Saat 30 Dk</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
