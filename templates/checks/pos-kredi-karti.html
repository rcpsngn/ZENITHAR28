{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="forms-container" style="padding: 10px 24px 40px 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(0, 255, 150, 0.15); padding-bottom: 12px;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i class="bi bi-credit-card" style="color: #00ff66; font-size: 24px;"></i>
            <h2 style="color: #00ff66; margin: 0; font-size: 20px; font-weight: 600;">POS & Şirket Kredi Kartları Takibi</h2>
        </div>
    </div>

    <div class="card" style="background: rgba(15, 31, 23, 0.5); border: 1px solid rgba(0, 255, 150, 0.2); border-radius: 6px; padding: 20px; overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 2px solid #004411; color: #00ff66; font-size: 12px;">
                    <th style="padding: 10px;">Kart / Cihaz Tanımı</th>
                    <th style="padding: 10px;">Banka</th>
                    <th style="padding: 10px; text-align: right;">Toplam Kart Limiti</th>
                    <th style="padding: 10px; text-align: right;">Güncel Borç Tutar</th>
                    <th style="padding: 10px; text-align: right; color: #00ff66;">Kullanılabilir Limit</th>
                </tr>
            </thead>
            <tbody>
                <tr style="border-bottom: 1px solid #002206; font-size: 13px; color: #1a202c; font-weight: 500;">
                    <td style="padding: 12px 10px;">Visa Ticari Şirket Kartı</td>
                    <td style="padding: 12px 10px;">Y Bankası</td>
                    <td style="padding: 12px 10px; text-align: right;">100.000,00</td>
                    <td style="padding: 12px 10px; text-align: right;">15.400,00</td>
                    <td style="padding: 12px 10px; text-align: right; color: #00ff66; font-weight: bold;">84.600,00</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
