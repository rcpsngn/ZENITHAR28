{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="forms-container" style="padding: 10px 24px 40px 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(0, 255, 150, 0.15); padding-bottom: 12px;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i class="bi bi-bank" style="color: #00ff66; font-size: 24px;"></i>
            <h2 style="color: #00ff66; margin: 0; font-size: 20px; font-weight: 600;">Banka Hareketleri</h2>
        </div>
    </div>

    <div class="card" style="background: rgba(15, 31, 23, 0.5); border: 1px solid rgba(0, 255, 150, 0.2); border-radius: 6px; padding: 16px; margin-bottom: 20px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
            <div>
                <label style="display: block; color: #1a202c; font-size: 12px; margin-bottom: 6px; font-weight: 600;">Banka Hesabı</label>
                <select class="search-input" style="width: 100%; height: 32px; box-sizing: border-box; padding: 0 5px;">
                    <option>Tüm Bankalar</option>
                    <option>X Bankası Ticari Hesap</option>
                </select>
            </div>
            <div>
                <label style="display: block; color: #1a202c; font-size: 12px; margin-bottom: 6px; font-weight: 600;">Tarih Dönemi</label>
                <input type="date" class="search-input" style="width: 100%; box-sizing: border-box;">
            </div>
            <div style="display: flex; align-items: flex-end;">
                <button class="dark-btn" style="width: 100%; height: 32px; background: #002208; border: 1px solid #004411; color: #00ff66; cursor: pointer;">Sorgula</button>
            </div>
        </div>
    </div>

    <div class="card" style="background: rgba(15, 31, 23, 0.5); border: 1px solid rgba(0, 255, 150, 0.2); border-radius: 6px; padding: 20px; overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 2px solid #004411; color: #00ff66; font-size: 12px;">
                    <th style="padding: 10px;">İşlem Tarihi</th>
                    <th style="padding: 10px;">Banka / Hesap</th>
                    <th style="padding: 10px;">Açıklama</th>
                    <th style="padding: 10px; text-align: right;">Gelen (Borç)</th>
                    <th style="padding: 10px; text-align: right;">Giden (Alacak)</th>
                </tr>
            </thead>
            <tbody>
                <tr style="border-bottom: 1px solid #002206; font-size: 13px; color: #1a202c; font-weight: 500;">
                    <td style="padding: 12px 10px;">30.06.2026</td>
                    <td style="padding: 12px 10px;">X Bankası - TR76...</td>
                    <td style="padding: 12px 10px;">X Firması Havale Ödemesi</td>
                    <td style="padding: 12px 10px; text-align: right; color: #00ff66; font-weight: bold;">45.000,00</td>
                    <td style="padding: 12px 10px; text-align: right;">0,00</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
