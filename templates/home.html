{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENITHAR Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>

body{
background:#0f172a;
color:white;
font-family:Arial, Helvetica, sans-serif;
}

/* SIDEBAR */

.sidebar{
width:250px;
height:100vh;
position:fixed;
background:#020617;
padding:20px;
}

.sidebar h3{
color:#38bdf8;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:#cbd5f5;
text-decoration:none;
padding:10px;
margin-bottom:5px;
border-radius:8px;
}

.sidebar a:hover{
background:#1e293b;
}

/* MAIN */

.main{
margin-left:260px;
padding:30px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:flex-end;
margin-bottom:20px;
}

<div class="notifications">

<span class="bell">
🔔
<span class="notif-count">3</span>
</span>

<div class="notif-dropdown">

<div class="notif-item">Yeni fatura oluşturuldu</div>
<div class="notif-item">Personel izin talebi</div>
<div class="notif-item">Sistem güncellemesi</div>

</div>

</div>

.user-button{
background:#16a34a;
padding:8px 16px;
border-radius:8px;
cursor:pointer;
}

/* CARDS */

.card{
background:#1e293b;
border:none;
border-radius:12px;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>ZENITHAR</h3>

<a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="/employees"><i class="bi bi-people"></i> Personel</a>
<a href="/leaves"><i class="bi bi-calendar-check"></i> İzinler</a>
<a href="/invoices"><i class="bi bi-receipt"></i> Faturalar</a>
<a href="/current_accounts"><i class="bi bi-bank"></i> Cari Hesap</a>

</div>

<div class="main">

<div class="topbar">

<div class="user-button">
👤 {{ request.user.username }} | <a href="{% url 'logout' %}" style="color:white;text-decoration:none;">Çıkış</a>
</div>

</div>

<h2>Dashboard</h2>

<div class="row mt-4">

<div class="col-md-3">
<div class="card p-3">
<h6>Toplam Personel</h6>
<h2>24</h2>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
<h6>Aktif Fatura</h6>
<h2>312</h2>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
<h6>Gelir</h6>
<h2>₺120,000</h2>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
<h6>Gider</h6>
<h2>₺42,000</h2>
</div>
</div>

</div>

<div class="row mt-5">

<div class="col-md-6">

<div class="card p-4">
<h5>Aylık Gelir</h5>

<canvas id="incomeChart"></canvas>

</div>

</div>

<div class="col-md-6">

<div class="card p-4">
<h5>Gider Analizi</h5>

<canvas id="expenseChart"></canvas>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

new Chart(document.getElementById("incomeChart"), {
type: "line",
data: {
labels: ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran"],
datasets: [{
label: "Gelir",
data: [12000,19000,15000,21000,25000,28000],
borderColor:"#38bdf8",
backgroundColor:"rgba(56,189,248,0.2)",
tension:0.4,
fill:true
}]
}
});

new Chart(document.getElementById("expenseChart"), {

type: "doughnut",

data: {
labels: ["Maaş","Vergi","Ofis","Diğer"],

datasets: [{
data: [40,25,20,15],

backgroundColor:[
"#3b82f6",
"#ef4444",
"#f59e0b",
"#eab308"
],

borderWidth:2
}]
},

options:{
responsive:true,
maintainAspectRatio:false,

cutout:"65%",

plugins:{
legend:{
position:"top",
align:"center",

labels:{
color:"#fff",
boxWidth:18,
padding:15
}
}
}

</script>

</body>
</html>
