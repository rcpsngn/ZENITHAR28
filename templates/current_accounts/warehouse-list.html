{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="forms-container" style="padding: 10px 24px 40px 24px;">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(0, 255, 150, 0.15); padding-bottom: 12px;">
        <i class="bi bi-building" style="color: #00ff66; font-size: 24px;"></i>
        <h2 style="color: #00ff66; margin: 0; font-size: 20px; font-weight: 600;">Depo Tanımları</h2>
    </div>

    <div class="card" style="background: rgba(15, 31, 23, 0.5); border: 1px solid rgba(0, 255, 150, 0.2); border-radius: 6px; padding: 20px; margin-bottom:20px; max-width:500px;">
        <form method="post" action="{% url 'warehouse_save' %}" style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
            {% csrf_token %}
            <div style="flex:1; min-width:150px;">
                <label style="display:block; font-size:12px; color:#7a8a99; margin-bottom:4px;">Depo Adı</label>
                <input type="text" name="name" class="search-input" required>
            </div>
            <div style="flex:1; min-width:150px;">
                <label style="display:block; font-size:12px; color:#7a8a99; margin-bottom:4px;">Lokasyon</label>
                <input type="text" name="location" class="search-input">
            </div>
            <button type="submit" style="background:#00ff66; color:#002208; border:none; padding:8px 16px; border-radius:6px; font-weight:700; cursor:pointer;">Ekle</button>
        </form>
    </div>

    <div class="card" style="background: rgba(15, 31, 23, 0.5); border: 1px solid rgba(0, 255, 150, 0.2); border-radius: 6px; padding: 20px;">
        <table style="width:100%; border-collapse:collapse; text-align:left;">
            <thead>
                <tr style="border-bottom:1px solid rgba(0,255,150,0.2); color:#7a8a99; font-size:12px;">
                    <th style="padding:8px;">Depo Adı</th>
                    <th style="padding:8px;">Lokasyon</th>
                    <th style="padding:8px; text-align:right;">İşlem</th>
                </tr>
            </thead>
            <tbody>
                {% for w in warehouses %}
                <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
                    <td style="padding:8px;">{{ w.name }}</td>
                    <td style="padding:8px; color:#7a8a99;">{{ w.location|default:"—" }}</td>
                    <td style="padding:8px; text-align:right;">
                        <a href="{% url 'warehouse_delete' w.id %}" onclick="return confirm('Bu depoyu silmek istediğinize emin misiniz?');" style="color:#ff6666;">🗑️</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" style="padding:16px; text-align:center; color:#7a8a99;">Henüz depo tanımlanmamış.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
